<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrowserBridge Options</title>
    <script type="module" src="/options.ts"></script>
  </head>
  <body>
    <main class="options-shell">
      <section class="panel">
        <div class="brand-row">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
          </span>
          <div>
            <p class="eyebrow">BrowserBridge</p>
            <h1>Chrome profile setup</h1>
            <p class="muted">Connect this browser profile to your private BrowserBridge server.</p>
          </div>
        </div>

        <form id="options-form" class="form">
          <label>
            API URL
            <input id="api-url" type="url" placeholder="https://browserbridge.test" autocomplete="off" />
          </label>

          <label>
            API token
            <input id="api-token" type="password" autocomplete="off" />
          </label>

          <label>
            Device name
            <input id="device-name" type="text" autocomplete="off" />
          </label>

          <div class="row wrap">
            <label>
              Browser
              <input id="browser-name" type="text" autocomplete="off" />
            </label>
            <label>
              Platform
              <input id="platform" type="text" autocomplete="off" />
            </label>
          </div>

          <div class="warning">
            History sync is off by default. If enabled, BrowserBridge stores a shared searchable history view on your server.
            BrowserBridge never syncs passwords, cookies, login sessions or form data.
          </div>

          <div class="actions">
            <button id="save-button" type="submit">Save settings</button>
            <button id="connect-button" type="button" class="secondary">Save and register device</button>
          </div>
        </form>

        <div id="status" class="muted" role="status"></div>
      </section>
    </main>
  </body>
</html>
